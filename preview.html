<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FireFlow Product Intelligence — Preview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Black+Han+Sans&family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
--bg:#0f0b0d;--panel:#171013;--panel2:#20161a;--raised:#2a1c21;
--red:#e8331c;--red-700:#c0210f;--ember:#ff6a2b;--gold:#f5b301;--jade:#12b886;--cobalt:#2f6bff;
--text:#f7efe6;--muted:#b6a29b;--dim:#9c8b83;
--ink-900:#f7efe6;--ink-800:#f2e9e0;--ink-700:#cbb9ae;--ink:#f2e9e0;
--paper-50:#0f0b0d;--paper-100:#171013;--paper-200:#20161a;
--chili-600:#e8331c;--chili-500:#ff6a2b;--chili-050:#e8331c1f;--carbo-400:#f5b301;--coral-700:#c0210f;
--samyang-accent:#f0a91f;--tangle-accent:#22b57f;--mep-accent:#3fb8c9;
--ok-500:#8fd14f;--warn-500:#f5b301;--risk-600:#ff6a4a;--info-500:#6f9bf0;
--src-official:#e0a94c;--src-retail:#c8b6a6;--src-editorial:#ff8a3c;--src-synthetic:#c58bd6;
--slate-600:#b6a29b;--slate-400:#9c8b83;--line:#ffffff16;--line-strong:#ffffff2a;
--font-display:"Anton","Archivo Black",Impact,system-ui,sans-serif;
--font-ui:"Inter",system-ui,-apple-system,sans-serif;
--r-sm:8px;--r-md:12px;--r-lg:18px;
--sh1:0 1px 2px #00000055,0 6px 20px #00000040;--sh2:0 18px 50px #00000075;--sh3:0 24px 60px #000000a6;
--focus:#f5b301;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font-ui);color:var(--text);background:
 radial-gradient(1100px 560px at 82% -6%, #2a0f0b 0%, #0f0b0d00 60%),
 radial-gradient(820px 460px at -8% 14%, #1c0f14 0%, #0f0b0d00 55%),
 var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:400;letter-spacing:.012em;line-height:1.05;margin:0 0 12px;text-transform:uppercase}
button{font-family:var(--font-ui);cursor:pointer}
a{color:var(--ember);text-decoration:none}
img{max-width:100%}
.wrap{max-width:1200px;margin:0 auto;padding:0 16px}
.eyebrow{text-transform:uppercase;letter-spacing:.16em;font-size:.74rem;color:var(--ember);margin:0 0 8px;font-weight:800}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;line-height:1;padding:.35em .7em;border-radius:999px;border:1px solid var(--line-strong);background:var(--raised);color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:4px}
.previewbanner{background:linear-gradient(90deg,#241503,#1a1013);color:var(--gold);text-align:center;font-size:.82rem;font-weight:700;padding:8px 16px;border-bottom:1px solid var(--line)}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .55s cubic-bezier(.2,.7,.2,1),transform .55s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}

/* ===== Mega nav (Option B split panel) ===== */
.mnav{position:sticky;top:0;z-index:60;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:0 8px 24px #00000055}
.mnav .bar{display:flex;align-items:center;gap:10px;padding:8px 16px;max-width:1200px;margin:0 auto}
.brandmark{font-family:var(--font-display);font-weight:400;font-size:1.35rem;color:var(--text);margin-right:8px;line-height:.9;letter-spacing:.02em}
.brandmark small{font-family:var(--font-ui);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ember);display:block;margin-top:3px;font-weight:700}
.mgroups{display:flex;gap:2px;flex:1}
.mgroup{background:none;border:1px solid transparent;color:var(--text);font-weight:600;font-size:.92rem;padding:.6em .85em;border-radius:8px;min-height:44px;display:inline-flex;align-items:center;position:relative}
.mgroup[aria-expanded="true"],.mgroup:hover{background:var(--raised)}
.mgroup[aria-expanded="true"]::after{content:"";position:absolute;left:12px;right:12px;bottom:-9px;height:3px;background:var(--red);border-radius:3px}
.soundbtn{background:var(--raised);border:1px solid var(--line-strong);color:var(--text);border-radius:999px;font-weight:700;font-size:.8rem;padding:.5em .9em;min-height:40px;display:inline-flex;gap:7px;align-items:center}
.soundbtn .wave{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.soundbtn[aria-pressed="true"] .wave{background:var(--ok-500);box-shadow:0 0 8px var(--ok-500)}
.hamb{display:none}
.mpanel{position:absolute;left:0;right:0;top:100%;background:var(--panel2);color:var(--text);border-bottom:1px solid var(--line);box-shadow:var(--sh2);display:none}
.mpanel::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--ember))}
.mpanel.open{display:block}
.mpanel .inner{max-width:1200px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1fr 1.25fr;gap:24px;min-height:230px}
.mkicker{font-size:.66rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ember);margin:0 0 8px}
.catlist{display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--line);padding-right:16px}
.cat{display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--text);font-weight:600;font-size:.95rem;padding:.6em .6em;border-radius:8px;min-height:44px;background:none;border:1px solid transparent;text-align:left;width:100%}
.cat:hover,.cat:focus-visible{background:var(--raised)}
.mprev{background:var(--raised);border:1px solid var(--line);border-radius:var(--r-md);padding:18px;display:grid;grid-template-columns:150px 1fr;gap:18px;align-items:center}
.mprev .previmg{width:150px;height:150px;object-fit:contain;background:radial-gradient(closest-side,#ffffff12,transparent 72%);border-radius:10px}
.mprev .prevname{font-size:1.35rem;margin:0 0 6px;color:var(--text)}
.mprev .prevtext{color:var(--muted);font-size:.9rem;margin:0 0 12px}
.mplanned{font-size:.6rem;color:var(--bg);background:var(--muted);border-radius:4px;font-weight:800;padding:.12em .4em;text-transform:uppercase;letter-spacing:.08em;margin-left:6px}
/* mobile drawer */
.mdrawer{position:fixed;inset:0;z-index:120;display:none}
.mdrawer[data-open="true"]{display:block}
.mdrawer .scrim{position:absolute;inset:0;background:#000000aa}
.mdrawer .sheet{position:absolute;top:0;right:0;bottom:0;width:min(340px,86vw);background:var(--panel2);border-left:1px solid var(--line);padding:16px;overflow:auto;box-shadow:var(--sh2)}
.mdrawer .sheet h3{margin:0 0 12px;font-size:1.2rem}
.mdrawer details{border-bottom:1px solid var(--line);padding:4px 0}
.mdrawer summary{cursor:pointer;font-weight:700;padding:10px 4px;color:var(--text);list-style:none}
.mdrawer summary::-webkit-details-marker{display:none}
.mdrawer a{display:block;color:var(--muted);font-weight:600;padding:8px 6px;min-height:40px}
.mdrawer a:hover{color:var(--text)}
.dclose{background:var(--raised);border:1px solid var(--line);color:var(--text);border-radius:8px;min-height:40px;padding:0 14px;font-weight:700;float:right}

/* ===== Breadcrumb ===== */
.trail{font-size:.82rem;color:var(--muted);padding:12px 16px;max-width:1200px;margin:0 auto}
.trail b{color:var(--dim);font-weight:400;margin:0 .4em}

/* ===== Stage / package ===== */
.stage{position:relative;display:grid;place-items:center;width:100%}
.stage.hero{aspect-ratio:1/1;max-width:380px}
.stage.dossier{aspect-ratio:1/1;max-width:340px}
.stage .ground{position:absolute;inset:6%;border-radius:50%;background:radial-gradient(closest-side,#e8331c30,#e8331c00 72%);z-index:0}
.pkg{position:relative;z-index:1;width:60%;aspect-ratio:3/4;border-radius:14px;background:linear-gradient(160deg,#241519,#161014);border:1px solid var(--line-strong);box-shadow:var(--sh2);display:flex;flex-direction:column;justify-content:flex-end;gap:4px;padding:14% 10% 10%;overflow:hidden}
.pkg::before{content:"";position:absolute;inset:0 0 auto 0;height:34%;background:var(--accent,var(--red));opacity:.92}
.pkg .bs{position:relative;color:#fff;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:.72rem;margin-bottom:auto}
.pkg .pn{font-family:var(--font-display);font-weight:400;line-height:1.05;color:var(--text);font-size:1rem}
.pkg .pf{font-size:.72rem;font-weight:600;color:var(--muted)}
.pimg{position:absolute;z-index:2;inset:2%;width:96%;height:96%;object-fit:contain;filter:drop-shadow(0 16px 24px #000a)}

/* ===== Hero ===== */
.hero{position:relative;background:radial-gradient(130% 130% at var(--mx,80%) var(--my,0%),#3a1912,#140b0d 58%);color:var(--text);overflow:hidden;border-bottom:1px solid var(--line)}
.hero .wrap{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center;padding:64px 16px;position:relative;z-index:1}
.hero h1{color:var(--text);font-size:clamp(2.3rem,5.4vw,3.6rem);max-width:16ch;letter-spacing:.01em;line-height:.98}
.lede{color:#f7efe6cc;font-size:1.14rem;max-width:52ch}
.controls{display:flex;flex-wrap:wrap;gap:24px;margin:24px 0}
.cl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:8px;font-weight:700}
.seg{display:inline-flex;gap:4px;padding:3px;background:#00000040;border:1px solid var(--line-strong);border-radius:999px}
.seg button{font-weight:700;font-size:.82rem;border:none;background:transparent;color:var(--muted);border-radius:999px;padding:.5em 1em;min-height:38px}
.seg button[aria-pressed="true"]{background:var(--red);color:#160d0b}
.picks{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:8px}
.pick{font-weight:700;font-size:.82rem;color:var(--text);background:#ffffff10;border:1px solid var(--line-strong);border-radius:999px;padding:.55em .95em;min-height:40px}
.pick[aria-pressed="true"]{background:var(--gold);color:#231400;border-color:var(--gold)}
.focus{display:grid;gap:16px;justify-items:center}
.fname{font-family:var(--font-display);font-size:1.8rem;color:var(--text);margin:0}
.fsub{color:var(--muted);font-size:.833rem;margin:0}
.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.btn{font-weight:700;border:1px solid transparent;border-radius:8px;display:inline-flex;align-items:center;gap:8px;font-size:.833rem;padding:.6em 1em;min-height:42px;transition:transform .12s var(--ease,ease),filter .18s,background .18s}
.btn.primary{background:var(--red);color:#fff;box-shadow:0 6px 18px #e8331c40}
.btn.primary:hover{background:var(--ember);color:#1a0a00}
.btn.secondary{background:var(--raised);color:var(--text);border-color:var(--line-strong)}
.btn.secondary:hover{border-color:var(--ember)}
.btn.ghost{background:transparent;color:var(--ember)}
.btn.ghost:hover{background:#ffffff10}
.empty-hero{border:1px dashed var(--line-strong);border-radius:14px;padding:32px;text-align:center;max-width:340px}

/* ===== Sections ===== */
section.sec{scroll-margin-top:104px}
.sec.light{background:transparent}
.sec.light2{background:#130d10}
.sec.dark{background:#0c080a;color:var(--text);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.sec.dark .h2{color:var(--text)}.sec.dark .muted{color:var(--muted)}
.sec .wrap{padding:64px 16px}
.h2{font-size:clamp(1.9rem,3.6vw,2.4rem);margin:0 0 8px;color:var(--text)}
.muted{color:var(--muted);max-width:64ch}
.chip{font-weight:700;font-size:.82rem;background:var(--raised);border:1px solid var(--line-strong);border-radius:999px;padding:.45em .85em;min-height:38px;display:inline-flex;align-items:center;gap:8px;color:var(--text)}
.chip[aria-pressed="true"]{background:var(--red);color:#fff;border-color:var(--red)}
.chipdot{width:9px;height:9px;border-radius:50%}
.row-filters{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}

/* ===== Portfolio — Option C immersive showcase ===== */
.showcase{background:radial-gradient(1000px 500px at 50% -10%, #1a0e12, transparent 60%);border-radius:22px;padding:clamp(16px,2.4vw,30px);border:1px solid var(--line);margin-top:16px}
.grid-C{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;list-style:none;padding:0;margin:0}
.grid-C>li{min-width:0}
.cardC{position:relative;border-radius:16px;padding:1px;background:#0c080a;overflow:hidden;min-height:290px;transition:transform .2s ease;height:100%}
.cardC:hover{transform:translateY(-3px)}
.cardC.on{outline:2px solid var(--gold);outline-offset:2px}
.cardC::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1.4px;background:radial-gradient(220px circle at var(--mx,50%) var(--my,50%),var(--accent,var(--ember)),transparent 60%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .3s ease;z-index:5;pointer-events:none}
.cardC:hover::before,.cardC:focus-within::before{opacity:1}
.cardC .surface{position:relative;height:100%;border-radius:15px;background:linear-gradient(180deg,#181013,#100a0c);padding:16px;display:flex;flex-direction:column;overflow:hidden}
.cardC .cglow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(240px circle at var(--mx,50%) var(--my,50%),color-mix(in oklab,var(--accent,var(--ember)) 20%,transparent),transparent 55%);opacity:0;transition:opacity .3s ease}
.cardC:hover .cglow,.cardC:focus-within .cglow{opacity:1}
.cardC .topline{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative;z-index:2}
.cardC .brandtag{font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.cardC .accentdot{width:9px;height:9px;border-radius:50%;background:var(--accent,var(--ember));box-shadow:0 0 12px var(--accent,var(--ember))}
.cardC .frame{position:relative;z-index:2;aspect-ratio:1/1;display:grid;place-items:center;margin:2px 0 12px;background:none;border:none;width:100%;cursor:pointer;padding:0}
.cardC .frame img{max-height:100%;max-width:88%;object-fit:contain;filter:drop-shadow(0 16px 22px #000a);transition:transform .35s cubic-bezier(.2,.7,.2,1)}
.cardC:hover .frame img,.cardC:focus-within .frame img{transform:scale(1.06) translateY(-4px)}
.cardC .cn{font-family:var(--font-display);font-weight:400;text-transform:uppercase;font-size:clamp(15px,1.5vw,20px);margin:0 0 8px;line-height:1;position:relative;z-index:2;color:var(--text);background:none;border:none;text-align:left;padding:0;cursor:pointer;letter-spacing:.01em}
.cardC .cmeta{position:relative;z-index:2;margin-top:auto;display:grid;gap:8px}
.cardC .cmeta .row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.cardC .formats{font-size:11.5px;color:var(--muted)}
.cardC .cbtns{display:flex;gap:8px;margin-top:4px}
.cardC .cbtns .btn{flex:1;justify-content:center;padding:.5em .6em;font-size:12.5px;min-height:38px}
.cardC .atag{font-size:.62rem;font-weight:800;color:var(--gold);border:1px solid #f5b30155;background:#f5b30115;border-radius:999px;padding:.15em .5em;text-transform:uppercase;letter-spacing:.04em}

/* ===== spiciness peppers (shared) ===== */
.peppers{display:inline-flex;gap:2px}
.pep{width:13px;height:16px;color:var(--accent);opacity:.2;filter:grayscale(1)}
.pep.on{opacity:1;filter:none}
.lvl{font-size:.76rem;font-weight:700;color:var(--text-1,var(--ink-700))}
.lvl.none{color:var(--text-2,var(--muted));font-weight:600}
.cardC .spicerow{align-items:center;gap:8px}
.typetag{font-size:.62rem;font-weight:800;color:var(--muted);border:1px solid var(--line-strong);border-radius:999px;padding:.15em .55em;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.spicechip{gap:6px}
.spicechip .peppers .pep{width:11px;height:13px}
.spicenote{font-size:.72rem;color:var(--dim);margin:2px 0 4px}

/* ===== heat pips (shared) ===== */
.heatpips{display:inline-flex;gap:3px;align-items:center}
.heatpips i{width:7px;height:7px;border-radius:50%;background:#ffffff1f;display:inline-block}
.heatpips i.on{background:linear-gradient(180deg,var(--ember),var(--red));box-shadow:0 0 7px #e8331c66}

/* ===== Rankings ===== */
.tabs{display:inline-flex;gap:4px;padding:4px;background:#00000040;border:1px solid var(--line-strong);border-radius:999px;flex-wrap:wrap}
.tabs button{font-weight:700;font-size:.82rem;border:none;background:transparent;color:var(--muted);border-radius:999px;padding:.5em .9em;min-height:38px}
.tabs button[aria-selected="true"]{background:var(--red);color:#fff}
.vmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0}
.purpose{font-size:1.1rem;margin:0;color:var(--text)}
.caveat{font-size:.833rem;color:var(--gold);background:#f5b3011a;border:1px solid #f5b30133;border-radius:8px;padding:8px 12px;max-width:70ch}
.rlist{list-style:none;padding:0;margin:16px 0 0;display:grid;gap:8px}
.rrow{display:grid;grid-template-columns:26px 44px minmax(120px,1.3fr) minmax(70px,2fr) 40px auto auto;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
.rk{font-family:var(--font-display);font-weight:400;color:var(--ember);text-align:center;font-size:1.1rem}
.rthumb{width:44px;height:44px;object-fit:contain;background:var(--raised);border-radius:8px}
.rn{text-align:left;background:none;border:none;font-weight:700;color:var(--text);font-size:1rem}
.bar{background:#00000055;border:1px solid var(--line);border-radius:999px;height:11px;overflow:hidden}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--ember) 55%,var(--red));width:0;transition:width .8s cubic-bezier(.2,.7,.2,1)}
.sc{font-family:var(--font-display);font-weight:400;text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
.miss{color:var(--warn-500);font-weight:700}
.add{font-size:.8rem;font-weight:700;background:var(--raised);border:1px solid var(--line-strong);border-radius:999px;padding:.35em .8em;color:var(--text);min-height:34px}
.add[disabled]{opacity:.5;cursor:default}

/* ===== Heat dial ===== */
.heatwrap{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center;background:linear-gradient(160deg,color-mix(in oklab,var(--panel2),var(--red) calc(var(--t,0)*22%)),var(--panel));border-radius:var(--r-lg);padding:32px;border:1px solid var(--line);transition:background .4s}
.heatgauge{position:relative;display:grid;place-items:center}
.heatgauge svg{width:220px;height:220px;position:absolute}
.heatsteps{display:flex;gap:6px;margin:16px 0}
.heatstep{flex:1;height:10px;border-radius:999px;background:#ffffff1f;border:none;min-height:24px}
.heatstep.on{background:linear-gradient(90deg,var(--gold),var(--red))}
.heatcap{color:var(--text)}
.heatctrl{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}

/* ===== Dossier ===== */
.dgrid{display:grid;grid-template-columns:360px 1fr;gap:48px;align-items:start}
.dleft{display:grid;gap:16px;justify-items:center;position:sticky;top:112px}
.dframe{position:relative;border-radius:var(--r-lg);padding:2px;background:linear-gradient(140deg,var(--card-accent,var(--red)),transparent 60%)}
.dframe .inner{background:var(--panel);border-radius:calc(var(--r-lg) - 2px);padding:12px}
.flabel{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800}
.name{font-family:var(--font-display);font-size:clamp(1.7rem,3vw,2.2rem);margin:4px 0 12px;color:var(--text)}
.story{font-size:1.1rem;max-width:60ch;color:#f7efe6cc}
.attrs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:16px 0}
.attrs dt{font-size:.72rem;color:var(--muted);font-weight:800;text-transform:uppercase}
.attrs dd{margin:0;font-weight:700;color:var(--text)}
.factcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sh1)}
.facthead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.fact{display:grid;gap:4px;padding:12px 0;border-top:1px solid var(--line)}
.fl{font-size:.72rem;color:var(--muted);font-weight:800;text-transform:uppercase;display:inline-flex;gap:8px;align-items:center}
.fv{color:var(--text);display:inline-flex;flex-wrap:wrap;gap:8px;align-items:center}
.unknown{color:var(--muted);font-style:italic}
.reminder{font-size:.833rem;color:var(--muted);background:var(--raised);border-radius:8px;padding:8px 12px;margin:12px 0 0}
.qwrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.qb{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px}
.qb h4{color:var(--text)}
.qb.mut{opacity:.5}
.qb ul{margin:0;padding-left:1.1em;color:var(--muted);font-size:.833rem;display:grid;gap:4px}
.relchips{display:flex;flex-wrap:wrap;gap:8px}
.relchip{font-size:.8rem;font-weight:600;background:var(--raised);border:1px solid var(--line-strong);border-radius:999px;padding:.35em .7em;color:var(--text);display:inline-flex;gap:6px;align-items:center;min-height:34px}
.relchip img{width:20px;height:20px;object-fit:contain}

/* ===== Compare — Option B versus battle ===== */
.cmp-presets{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.battle{display:grid;grid-template-columns:1fr 92px 1fr;gap:0;align-items:stretch;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;margin-top:8px}
.bside{padding:22px;min-width:0}
.bside.right{text-align:right}
.bsideTop{display:flex;gap:14px;align-items:center}
.bside.right .bsideTop{flex-direction:row-reverse}
.bside .bthumb{width:66px;height:66px;object-fit:contain;background:var(--raised);border-radius:10px;flex:none}
.bsideName{font-family:var(--font-display);font-weight:400;font-size:clamp(17px,2.2vw,24px);text-transform:uppercase;letter-spacing:.4px;line-height:1;color:var(--text)}
.bswap{margin-top:12px}
.bstat{margin-top:18px}
.bstat__top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.bside.right .bstat__top{flex-direction:row-reverse}
.bstat__val{color:var(--text);font-family:var(--font-display);font-weight:400;font-size:16px;letter-spacing:.4px}
.bstat__track{margin-top:7px;height:16px;border-radius:999px;background:#00000055;border:1px solid var(--line);overflow:hidden}
.bstat__fill{height:100%;width:0;border-radius:999px;transition:width .95s cubic-bezier(.2,.8,.2,1)}
.bside.right .bstat__track{transform:scaleX(-1)}
.fill-heat{background:linear-gradient(90deg,var(--gold),var(--ember) 55%,var(--red))}
.fill-cream{background:linear-gradient(90deg,#5a3b2e,#e9d3b5)}
.bfacts{margin-top:18px;border-top:1px dashed var(--line);padding-top:14px;font-size:13px}
.bfacts dt{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:800;margin-top:10px}
.bfacts dd{margin:2px 0 0;color:var(--text)}
.bactions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.bside.right .bactions{justify-content:flex-end}
.bdivider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(180deg,#2a1016,#160b0f);border-left:1px solid var(--line);border-right:1px solid var(--line)}
.bdivider .vs{font-family:var(--font-display);font-size:30px;color:var(--red);text-shadow:0 0 18px #e8331c66}
.bdivider .k{font-family:var(--font-ui);font-weight:800;font-size:14px;color:var(--gold);writing-mode:vertical-rl}
.bswap select,.cmp-empty select{font-family:var(--font-ui);font-size:.85rem;color:var(--text);background:var(--raised);border:1px solid var(--line-strong);border-radius:8px;padding:.45em .6em;min-height:40px;max-width:100%}
.cmp-empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--line-strong);border-radius:14px;background:var(--panel)}
.tag-ed{font-size:.62rem;font-weight:800;color:var(--src-editorial);text-transform:uppercase;letter-spacing:.06em}

/* ===== Paths ===== */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.path{border:1px solid var(--line);border-radius:22px;background:var(--panel);padding:24px;box-shadow:var(--sh1)}
.path.on{border-color:var(--ember);box-shadow:0 0 0 2px #ff6a2b22,var(--sh1)}
.phead{display:flex;justify-content:space-between;align-items:center}
.phead h3{color:var(--text)}
.youare{font-size:.72rem;font-weight:800;color:var(--ember);background:#ff6a2b1a;border:1px solid #ff6a2b55;border-radius:999px;padding:.2em .7em}
.ctx{font-size:.833rem;color:var(--muted);background:var(--raised);border-radius:8px;padding:8px 12px;display:flex;gap:10px;align-items:center}
.ctx b{color:var(--text)}
.ctx img{width:34px;height:34px;object-fit:contain}
.issues{display:grid;gap:8px;margin-top:12px}
.issue{display:flex;gap:8px;align-items:center;font-size:1rem;padding:.6em .7em;border:1px solid var(--line);border-radius:8px;color:var(--text)}
.issue.on{border-color:var(--ember);background:#ff6a2b12;font-weight:600}
.detail{margin-top:16px;border-top:1px solid var(--line);padding-top:16px;display:grid;gap:12px}
.sev{font-size:.833rem;font-weight:800;padding:.25em .7em;border-radius:999px;border:1px solid}
.sev[data-s="standard"]{color:var(--cobalt);border-color:var(--cobalt)}
.sev[data-s="elevated"]{color:var(--warn-500);border-color:var(--warn-500)}
.sev[data-s="priority"]{color:var(--ember);border-color:var(--ember)}
.sev[data-s="specialist"]{color:#fff;background:var(--red);border-color:var(--red)}
.escal{font-size:.833rem;background:#1a1013;border:1px solid #ffffff1f;border-left:3px solid var(--cobalt);border-radius:8px;padding:12px;color:var(--muted)}
.steps{display:flex;flex-wrap:wrap;gap:8px;list-style:none;padding:0;margin:0;counter-reset:step}
.steps li{font-size:.833rem;font-weight:700;background:var(--raised);border-radius:999px;padding:.3em .7em;counter-increment:step;color:var(--text)}
.steps li::before{content:counter(step) ". ";color:var(--ember);font-weight:800}

/* ===== Simulator ===== */
.pickrow{display:flex;flex-wrap:wrap;gap:8px}
.spick{font-size:.833rem;font-weight:700;color:var(--text);background:#ffffff10;border:1px solid var(--line-strong);border-radius:999px;padding:.5em .9em;min-height:40px}
.spick[aria-pressed="true"]{background:var(--gold);color:#231400;border-color:var(--gold)}
.case{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:22px;padding:32px;margin-top:20px}
.casehead{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ctitle{font-family:var(--font-display);font-size:1.7rem;margin:0;color:var(--text)}
.timeline{list-style:none;display:flex;flex-wrap:wrap;padding:0;margin:16px 0 20px}
.timeline li{flex:1 1 auto;min-width:92px}
.tbtn{display:grid;justify-items:center;gap:8px;width:100%;background:none;border:none;padding:8px 4px;position:relative}
.tbtn::before,.tbtn::after{content:"";position:absolute;top:11px;height:2px;background:var(--line-strong)}
.tbtn::before{left:0;right:50%}.tbtn::after{left:50%;right:0}
.timeline li:first-child .tbtn::before{display:none}.timeline li:last-child .tbtn::after{display:none}
.tdot{width:14px;height:14px;border-radius:50%;background:var(--panel);border:2px solid var(--dim);position:relative;z-index:1}
.tlabel{font-size:.78rem;font-weight:600;color:var(--muted);text-align:center}
.tdone .tdot{background:var(--jade);border-color:var(--jade)}.tdone .tbtn::before,.tdone .tbtn::after{background:var(--jade)}
.tcur .tdot{background:var(--red);border-color:var(--red);box-shadow:0 0 0 4px #e8331c33}
.tcur .tlabel{color:var(--text);font-weight:800}
.stagebox{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:20px}
.stagebox h4{color:var(--text)}
.catt{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.att{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px}
.att h5{margin:0 0 8px;font-size:.72rem;text-transform:uppercase;color:var(--muted);font-family:var(--font-ui);letter-spacing:.08em}
.att ul{margin:0;padding-left:1.1em;font-size:.833rem;display:grid;gap:4px;color:var(--text)}
.att p{margin:0 0 4px;font-size:.833rem;color:var(--text)}
.att b{color:var(--text)}

/* ===== Footer ===== */
footer.foot{background:#0c080a;color:var(--text);border-top:1px solid var(--line)}
.foot .top{height:3px;background:linear-gradient(90deg,var(--red),var(--ember));transform:scaleX(0);transform-origin:center;transition:transform .7s ease}
.foot .top.in{transform:scaleX(1)}
.foot .wrap{padding:48px 16px;display:grid;gap:24px}
.fcols{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:24px}
.fcol h4{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin:0 0 10px}
.fcol a{display:block;color:var(--muted);font-size:.9rem;padding:3px 0}
.fcol a:hover{color:var(--text)}
.flead{font-family:var(--font-display);font-size:1.4rem;color:var(--text);margin:0 0 8px}
.disc{font-size:.8rem;color:var(--muted);max-width:90ch;margin:0}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:.8rem;color:var(--muted)}

/* ===== Selected-product rail — Option B (fixed) ===== */
.rail{position:fixed;left:0;right:0;bottom:0;z-index:35;background:linear-gradient(180deg,var(--panel2),var(--panel));border-top:1px solid var(--line);box-shadow:0 -10px 30px #00000066}
.rail .wrap{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;overflow-x:auto;padding:10px 16px;max-width:1200px;margin:0 auto}
.railaccent{display:none}
.railphoto{width:46px;height:46px;object-fit:contain;background:var(--raised);border-radius:10px;flex:none}
.railmain{display:flex;flex-direction:column;gap:2px;min-width:0}
.brandchip{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text)}
.brandchip .bdot{width:8px;height:8px;border-radius:50%}
.rname{font-weight:700;color:var(--text);white-space:nowrap}
.rfmt{color:var(--muted);font-weight:500}
.railheat{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text);font-weight:700}
.railheat .word{color:var(--muted);font-weight:600}
.rmode{font-size:.72rem;font-weight:800;text-transform:capitalize;padding:.2em .6em;border-radius:999px;border:1px solid var(--line-strong);color:var(--muted);flex:none}
.railact{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:.8rem;border:1px solid var(--line-strong);border-radius:8px;background:#ffffff08;color:var(--text);padding:.5em .7em;min-height:40px;white-space:nowrap;flex:none}
.railact .sub{display:none}
.railact.primary{background:linear-gradient(180deg,var(--red),var(--red-700));border-color:#ffffff22;color:#fff}
.railact.ghost{background:transparent}
.railact svg{width:18px;height:18px;flex:none}
.railreset{font-size:.8rem;font-weight:700;background:none;border:1px solid var(--line-strong);border-radius:999px;padding:.4em .8em;color:var(--muted);flex:none;min-height:40px}
.railprompt{color:var(--muted);font-size:.85rem}
.spacer{flex:1;min-width:8px}
@media(min-width:1760px){
 .rail{left:auto;right:16px;bottom:auto;top:96px;width:300px;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--sh2)}
 .rail::before{content:"";display:block;height:5px;background:linear-gradient(90deg,var(--red),var(--ember))}
 .rail .wrap{display:block;overflow:visible;padding:0}
 .railphoto{width:100%;height:180px;border-radius:0;background:radial-gradient(closest-side,#e8331c1f,transparent 72%)}
 .railtop{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px}
 .railbody{padding:2px 16px 8px}
 .railmain{padding:0 0 8px}
 .rname{white-space:normal;font-family:var(--font-display);font-weight:400;font-size:1.4rem;text-transform:uppercase}
 .railactions{display:grid;gap:8px;padding:6px 16px 18px}
 .railact{width:100%;justify-content:flex-start}
 .railact .sub{display:block;font-weight:500;font-size:.7rem;color:#f7efe6b0;margin-top:1px}
 .raildivider{height:1px;background:var(--line);margin:6px 2px}
}
@media(max-width:1759px){
 body{padding-bottom:78px}
 .railtop,.railactions{display:contents}
 .railmain .rmode{display:none}
}

/* ===== Support widget — Option C ===== */
.ffw{position:fixed;right:18px;bottom:18px;z-index:70}
@media(max-width:1759px){.ffw{bottom:90px}}
.fab{position:relative;display:inline-flex;align-items:center;gap:9px;min-height:52px;padding:0 18px 0 15px;border:none;border-radius:999px;font-weight:800;font-size:.94rem;color:#fff;background:linear-gradient(135deg,var(--ember),var(--red) 52%,var(--red-700));box-shadow:0 10px 26px #e8331c40,0 4px 10px #00000066;transition:transform .18s ease,box-shadow .18s ease}
.fab:hover{transform:translateY(-1px)}
.fab .flame{width:22px;height:22px;flex:none}
.fab[aria-expanded="true"]{background:var(--raised);color:var(--text);box-shadow:0 6px 18px #00000066}
.fpanel{position:absolute;right:0;bottom:64px;width:min(316px,calc(100vw - 36px));max-height:460px;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;box-shadow:0 24px 60px #000000a6,0 4px 14px #00000080;overflow:hidden;transform-origin:bottom right;transform:translateY(10px) scale(.96);opacity:0;visibility:hidden;transition:transform .2s var(--ease,ease),opacity .2s,visibility 0s linear .2s}
.fpanel.open{transform:none;opacity:1;visibility:visible;transition-delay:0s}
.fflourish{position:absolute;top:-10px;right:-6px;font-family:var(--font-display);font-size:5.4rem;line-height:1;color:#ffffff08;pointer-events:none;z-index:0}
.p-head{position:relative;z-index:1;display:flex;align-items:flex-start;gap:10px;padding:15px 15px 12px;border-bottom:1px solid var(--line)}
.p-title{font-family:var(--font-display);font-size:1.16rem;letter-spacing:.02em;line-height:1.05;margin:0;color:var(--text)}
.p-sub{font-size:.8rem;color:var(--muted);margin:3px 0 0}
.p-close{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--raised);display:grid;place-items:center;color:var(--text);margin-left:auto}
.p-close svg{width:15px;height:15px}
.p-body{position:relative;z-index:1;overflow-y:auto;padding:13px 15px 15px;display:grid;gap:11px}
.fseg{display:flex;background:#00000040;border:1px solid var(--line);border-radius:999px;padding:3px;gap:3px}
.fseg button{flex:1;min-height:38px;border:none;background:none;color:var(--muted);font-weight:800;font-size:.86rem;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.fseg button svg{width:15px;height:15px}
.fseg button[aria-pressed="true"]{background:var(--raised);color:var(--text);box-shadow:0 1px 4px #00000059}
.statline{display:flex;gap:9px;align-items:flex-start;font-size:.85rem;color:var(--text)}
.statline .sic{flex:none;width:18px;height:18px;color:var(--jade);margin-top:1px}
.statline .sic.g{color:var(--gold)}
.statline .sic svg{width:18px;height:18px}
.statline b{font-weight:800}
.statline span span{color:var(--muted)}
.tinynote{font-size:.71rem;color:var(--dim);line-height:1.45}
.fact-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:46px;border-radius:999px;font-weight:800;font-size:.94rem;border:1px solid transparent;background:linear-gradient(135deg,var(--ember),var(--red) 60%,var(--red-700));color:#fff;box-shadow:0 6px 16px #e8331c33}
.fact-primary svg{width:17px;height:17px}

/* ===== Command Center ===== */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:20px 0}
.kpi{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;min-height:96px;display:flex;flex-direction:column;gap:4px;color:var(--text);transition:transform .12s ease,border-color .18s}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.kpi[aria-pressed="true"]{border-color:var(--ember);box-shadow:0 0 0 1px var(--ember)}
.kpi .kn{font-family:var(--font-display);font-weight:400;font-size:1.9rem;line-height:1;color:var(--text)}
.kpi .kl{font-size:.78rem;font-weight:700;color:var(--text)}
.kpi .ks{font-size:.7rem;color:var(--muted)}
.caselist{display:grid;gap:8px;margin-top:8px}
.caserow{display:grid;grid-template-columns:minmax(160px,2fr) auto auto minmax(120px,1fr) minmax(140px,1.2fr) auto;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px}
.caserow.od{border-left:3px solid var(--risk-600)}
.caserow .ct{font-weight:700;color:var(--text);font-size:.95rem}
.caserow .own{font-size:.82rem;color:var(--text)}
.caserow .nxt{font-size:.8rem;color:var(--muted)}
.caserow .nxt.odt{color:var(--risk-600);font-weight:700}
.caserow .add{white-space:nowrap}
.sev svg{margin-right:3px;vertical-align:-1px}
.chtag{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;border:1px solid var(--line-strong);border-radius:999px;padding:.28em .6em;color:var(--text);display:inline-flex;gap:6px;align-items:center;min-height:auto}
.chtag .cd{width:8px;height:8px;border-radius:2px;flex:none}

/* ===== Signals ===== */
.siggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin:20px 0}
.sigcard{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;color:var(--text);display:flex;flex-direction:column;gap:8px;min-height:158px;transition:transform .12s ease,border-color .18s}
.sigcard:hover{transform:translateY(-2px);border-color:var(--line-strong)}
.sigcard[aria-pressed="true"]{border-color:var(--ember);box-shadow:0 0 0 1px var(--ember)}
.sigcard h4{font-family:var(--font-display);font-weight:400;font-size:1.16rem;margin:0;color:var(--text)}
.sigcard .sp{font-size:.82rem;color:var(--muted);margin:0}
.sigflow{display:flex;flex-wrap:wrap;gap:6px;font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--ember);margin-top:auto}
.sigflow span::after{content:"\2192";margin-left:6px;color:var(--dim)}
.sigflow span:last-child::after{content:""}
.sigdetail{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:8px;display:grid;gap:16px}
.sighead{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
.sigcols{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.sigcols .att{margin:0}

/* ===== Brand universe ===== */
.brandwall{display:grid;gap:16px;margin-top:20px}
.bfeature{border:1px solid var(--line);border-radius:18px;padding:24px;background:var(--panel);border-top:3px solid var(--baccent,var(--ember))}
.bhead{display:flex;align-items:center;gap:10px}
.bhead .bd{width:13px;height:13px;border-radius:50%;background:var(--baccent,var(--ember));flex:none;box-shadow:0 0 12px var(--baccent,var(--ember))}
.btitle{font-family:var(--font-display);font-weight:400;font-size:1.7rem;margin:0;color:var(--text)}
.bpos{color:var(--muted);font-size:.92rem;margin:8px 0 14px;max-width:60ch}
.bsub{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:center}
.bnum{font-family:var(--font-display);font-weight:400;font-size:2.6rem;color:var(--baccent,var(--ember));line-height:1}
.bnum small{display:block;font-family:var(--font-ui);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.bflag{display:flex;gap:14px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px}
.bflag img{width:78px;height:78px;object-fit:contain;flex:none;background:radial-gradient(closest-side,#ffffff10,transparent 72%);border-radius:8px}
.bflagbody .fn{font-weight:800;color:var(--text)}
.bflagbody .fk{font-size:.76rem;color:var(--muted)}
.bangle{display:grid;gap:8px;font-size:.86rem;margin:14px 0}
.bangle .row{display:flex;gap:8px}
.bangle b{color:var(--text);flex:none}
.bangle span{color:var(--muted)}
.brandtri{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.bmini{border:1px solid var(--line);border-radius:18px;padding:20px;background:var(--panel);border-top:3px solid var(--baccent,var(--ember));display:flex;flex-direction:column;gap:10px}
.bminibox{width:118px;margin:2px auto 4px}
@media(max-width:820px){.brandtri{grid-template-columns:1fr}.bsub{grid-template-columns:1fr}}

/* ===== FAQ ===== */
.faqlist{display:grid;gap:8px;margin-top:20px;max-width:80ch}
.faqlist details{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:2px 16px}

.faqlist details[open] summary::after{content:"\2013"}
.faqlist details[open] summary{border-bottom:1px solid var(--line)}

const FFSound=(()=>{let ctx=null,master=null,enabled=(localStorage.getItem('ff.sound')==='on');
 function ensure(){if(!ctx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;ctx=new AC();master=ctx.createGain();master.gain.value=0.14;master.connect(ctx.destination);}if(ctx.state==='suspended')ctx.resume();return ctx;}
 function tone(freq,dur,type){if(!enabled)return;if(!ensure())return;const g=ctx.createGain();g.gain.value=0;const o=ctx.createOscillator();o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(master);const t=ctx.currentTime;g.gain.linearRampToValueAtTime(0.5,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.02);}
 function sizzle(intensity){if(!enabled)return;if(!ensure())return;const dur=0.34,n=ctx.sampleRate*dur,buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=buf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900+intensity*1900;bp.Q.value=0.8;const g=ctx.createGain();g.gain.value=0;s.connect(bp);bp.connect(g);g.connect(master);const t=ctx.currentTime;g.gain.linearRampToValueAtTime(0.18+intensity*0.16,t+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+dur);s.start(t);s.stop(t+dur);}
 return {tick(){tone(430,0.07,'triangle')},chime(){tone(660,0.16);setTimeout(()=>tone(990,0.2),90)},sizzle,
  toggle(){enabled=!enabled;localStorage.setItem('ff.sound',enabled?'on':'off');if(enabled)ensure();return enabled},isOn(){return enabled}};
})();

function syncPreview(panel,cat){
 if(!panel||!cat)return;
 const img=panel.querySelector('.previmg');
 img.onerror=function(){this.style.display='none'};img.style.display='';
 img.setAttribute('alt',cat.getAttribute('data-name'));img.src=cat.getAttribute('data-img');

function wireNav(){

 nav.querySelectorAll('.mpanel').forEach(p=>{p.addEventListener('keydown',e=>{if(e.key==='Escape'){e.preventDefault();const t=document.querySelector('[aria-controls="'+p.id+'"]');closePanels();if(t)t.focus()}})});

 // mobile drawer
 const drawer=document.getElementById('mdrawer'),hamb=nav.querySelector('[data-navmob]'),dclose=document.getElementById('dclose');let opener=null;
 function openD(){opener=hamb;drawer.setAttribute('data-open','true');hamb.setAttribute('aria-expanded','true');document.body.style.overflow='hidden';dclose.focus()}
 function closeD(){drawer.setAttribute('data-open','false');hamb.setAttribute('aria-expanded','false');document.body.style.overflow='';if(opener){opener.focus();opener=null}}

 drawer.querySelectorAll('[data-dclose]').forEach(b=>b.addEventListener('click',closeD));
 drawer.querySelectorAll('[data-dlink]').forEach(a=>a.addEventListener('click',closeD));

}

const FAQS=[
 ['Is this an official Samyang site?','No. FireFlow is an independent Customer Experience portfolio concept built by Nathan as a job-application piece. It is not affiliated with, endorsed by, or operated by Samyang. Product facts reference public information; everything operational is a demonstration.'],
 ['How are products ranked?','There is no single &ldquo;best&rdquo; list. Rankings are multi-axis — each view measures one thing (official prominence, retail visibility, first-time fit, and so on), shows the weighted inputs it used, and labels its source, confidence, and last-reviewed date. Families that are not scored in a view are left out rather than guessed.'],
 ['Are the inquiry records real?','No. Every case, owner, timeline, metric, and signal in the Command Center, Resolution Simulator, and Product Signals is synthetic demonstration data, labeled with a Synthetic badge. It exists to show the workflow, not to report real Samyang operations.'],
 ['Why are formats grouped into families?','Samyang lists each format as its own product. FireFlow normalizes them into 45 families across 76 formats, so a shopper can compare, for example, Carbonara across its multi-pack, sauce, and snack formats without treating each as an unrelated item.'],
 ['Can consumers submit a real complaint here?','No. This is a static preview. The support flows show how an issue would be captured and routed — the exact product, the evidence requested, the severity, and the owner — but no submission is sent anywhere.'],
 ['Can vendors place a real order here?','No. The vendor paths demonstrate order, freight, deduction, and sell-sheet workflows. Nothing is transmitted; there is no live ordering, EDI, or account system behind the preview.'],
 ['Where does product information come from?','Facts are labeled by origin: official Samyang America public product information, public retail signals (single-listing, date-stamped, and never sales figures), FireFlow editorial models that are clearly not official ratings, and synthetic demonstration data. Each label tells you how much to trust a given fact.'],
 ['How are allergens handled?','Allergens and preparation are bound to the exact format, not the family, because they can differ between a multi-pack and a sauce. Where public data does not cover a specific format, FireFlow says so and reminds you to verify the current package rather than guessing.'],
 ['What does Customer Guidance Opportunity mean?','It is a repeated question that a small guidance change could answer before it becomes a complaint — for example, the same milk-allergen question on creamy variants. It is treated as an improvement to make, not a customer error.'],
 ['Why was FireFlow created?','To demonstrate, in a real product domain, how Nathan approaches Customer Experience: know the product, understand the friction, and resolve the experience with clear ownership, honest sourcing, and a continuous-improvement loop. It is a portfolio concept for a Samyang CX role.']
];
function renderFaq(){
 return `<section class="sec dark" id="faq"><div class="wrap">
 <p class="eyebrow" style="color:var(--carbo-400)">About</p><h2 class="h2">Straight answers</h2>
 <p class="muted">Honest answers about what this project is, where its facts come from, and what it does and does not do.</p>
 <div class="faqlist">${FAQS.map(([q,a])=>`<details><summary>${esc(q)}</summary><p class="faqp">${a}</p></details>`).join('')}</div>
 </div></section>`}

 host.innerHTML=`<div class="ffw">

 <div class="fpanel" id="ffwPanel" role="dialog" aria-modal="true" aria-labelledby="ffwTitle" inert>
  <span class="fflourish" aria-hidden="true">火</span>
  <div class="p-head"><div><h2 class="p-title" id="ffwTitle">Support status</h2><p class="p-sub">When to expect a reply, and how to start.</p></div><button class="p-close" id="ffwClose" aria-label="Close support status"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></button></div>

   <button data-frole="consumer" aria-pressed="true"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 8h16l-1.2 9.2A2 2 0 0 1 16.8 19H7.2a2 2 0 0 1-2-1.8L4 8Z" stroke="currentColor" stroke-width="1.7"/></svg>Consumer</button>
   <button data-frole="vendor" aria-pressed="false"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 7h13l1 4h4v5M3 7v9h4M9 16h6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>Vendor</button></div>
   <div data-fstatus="consumer"><div class="statline"><span class="sic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><b>Consumer care.</b> Replies usually within one business day.</span></div><div class="statline"><span class="sic g" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.7"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span><span>Monday to Friday, 8am to 5pm Pacific.</span></div></div>
   <div data-fstatus="vendor" hidden><div class="statline"><span class="sic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span><b>Vendor support.</b> Order and delivery questions answered same business day.</span></div><div class="statline"><span class="sic g" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.7"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span><span>Invoice and deduction reviews within two business days.</span></div></div>
   <a class="fact-primary" id="ffwStart" href="#resolve" data-act="mode" data-mode="consumer"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 5h16v11H7l-3 3V5Z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/></svg><span data-fcta>Start a consumer case</span></a>
   <p class="tinynote">Example service levels for this study, not a published commitment. A reaction, injury, foreign material, or tampering goes to a specialist, and FireFlow does not give medical advice.</p>
  </div></div></div>`;
 wireSupport();return ''}
function wireSupport(){const fab=document.getElementById('ffwFab'),panel=document.getElementById('ffwPanel'),closeBtn=document.getElementById('ffwClose');
 const FOCUSABLE='a[href],button:not([disabled]),input:not([disabled]),[tabindex]:not([tabindex="-1"])';
 function vis(){return Array.prototype.filter.call(panel.querySelectorAll(FOCUSABLE),el=>el.offsetParent!==null&&!el.closest('[hidden]'))}
 function open(){panel.inert=false;panel.classList.add('open');fab.setAttribute('aria-expanded','true');requestAnimationFrame(()=>{const l=vis();(l[0]||closeBtn).focus()})}
 function close(){panel.classList.remove('open');fab.setAttribute('aria-expanded','false');panel.inert=true;fab.focus()}
 fab.addEventListener('click',()=>{fab.getAttribute('aria-expanded')==='true'?close():open()});
 closeBtn.addEventListener('click',close);
 panel.addEventListener('keydown',e=>{if(e.key==='Escape'){e.stopPropagation();close();return}if(e.key!=='Tab')return;const f=vis();if(!f.length)return;const first=f[0],last=f[f.length-1];if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}});
 const seg=panel.querySelector('.fseg'),cta=panel.querySelector('[data-fcta]'),start=document.getElementById('ffwStart');
 seg.addEventListener('click',e=>{const b=e.target.closest('[data-frole]');if(!b)return;const role=b.getAttribute('data-frole');seg.querySelectorAll('[data-frole]').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));panel.querySelectorAll('[data-fstatus]').forEach(s=>{s.hidden=s.getAttribute('data-fstatus')!==role});cta.textContent=role==='vendor'?'Start a vendor case':'Start a consumer case';start.setAttribute('data-mode',role);start.setAttribute('href',role==='vendor'?'#vendor':'#resolve')});
 start.addEventListener('click',close);
}
function render(){
 document.getElementById('app').innerHTML=renderHero()+renderPortfolio()+renderRankings()+renderHeat()+renderCompare()+renderDossier()+renderPaths()+renderSim()+renderCommand()+renderSignals()+renderBrands()+renderMethodology()+renderFaq();
 renderRail();
 enhance();
}

function enhance(){
 requestAnimationFrame(()=>{document.querySelectorAll('.bar>span[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%'});
  document.querySelectorAll('[data-heatarc]').forEach(el=>{el.style.strokeDashoffset=el.dataset.heatarc});
  document.querySelectorAll('[data-fillbar]').forEach(el=>{el.style.width=el.dataset.fillbar});});
 if(RM){document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));animated=true;}
 else if(!animated){const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.12});document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));animated=true;}
 else document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));
 if(!RM){document.querySelectorAll('[data-tilt]').forEach(card=>{const wrap=card.parentElement;
  wrap.addEventListener('pointermove',e=>{const r=card.getBoundingClientRect(),px=(e.clientX-r.left)/r.width,py=(e.clientY-r.top)/r.height;card.style.transform=`rotateY(${(px-.5)*6}deg) rotateX(${(.5-py)*6}deg)`;card.style.setProperty('--gx',px*100+'%');card.style.setProperty('--gy',py*100+'%')});
  wrap.addEventListener('pointerleave',()=>{card.style.transform=''})});
  document.querySelectorAll('[data-glow]').forEach(card=>{card.addEventListener('pointermove',e=>{const r=card.getBoundingClientRect();card.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');card.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%')})});
  const hero=document.querySelector('[data-spotlight]');if(hero){hero.addEventListener('pointermove',e=>{const r=hero.getBoundingClientRect();hero.style.setProperty('--mx',(e.clientX-r.left)/r.width*100+'%');hero.style.setProperty('--my',(e.clientY-r.top)/r.height*100+'%')})}}
}

document.addEventListener('click',e=>{
 const a=e.target.closest('[data-act]');if(!a)return;
 const d=a.dataset,act=d.act,anchor=a.getAttribute&&a.getAttribute('href');
 if(act==='noop'){}
 else if(act==='pick'){selFamily(d.fid)}
 else if(act==='pickvar'){selFamily(d.fid);st.variantId=d.vid;render()}
 else if(act==='mode'){st.mode=d.mode;FFSound.tick();render()}
 else if(act==='hbrand'){st.brand=d.brand;render()}
 else if(act==='pfbrand'){st.pfBrand=d.brand;st.pfCat='all';render()}
 else if(act==='pfcat'){st.pfCat=d.cat;render()}
 else if(act==='pfview'){st.pfView=d.view;render()}
 else if(act==='pfspice'){st.pfSpice=st.pfSpice===+d.lvl?null:+d.lvl;render()}
 else if(act==='pftype'){st.pfType=st.pfType===d.type?null:d.type;render()}
 else if(act==='rank'){st.rankingMode=d.rank;render()}
 else if(act==='add'){if(!st.compareIds.includes(d.fid)&&st.compareIds.length<4){st.compareIds.push(d.fid);FFSound.tick()}render()}
 else if(act==='rm'){st.compareIds=st.compareIds.filter(x=>x!==d.fid);render()}
 else if(act==='clearcmp'){st.compareIds=[];render()}
 else if(act==='preset'){st.compareIds=d.ids.split(',');render()}
 else if(act==='cmpswap'){const slot=+d.slot,cur=st.compareIds[slot],used=new Set(st.compareIds);const pool=FF.families.filter(f=>!used.has(f.id)||f.id===cur);let idx=pool.findIndex(f=>f.id===cur);const nx=pool[(idx+1)%pool.length];if(nx){st.compareIds=st.compareIds.slice();st.compareIds[slot]=nx.id}render()}
 else if(act==='pickmode'){selFamily(d.fid);st.mode=d.mode;render()}
 else if(act==='setfmt'){st.variantId=d.vid;render()}
 else if(act==='issue'){if(d.channel==='consumer')st.cIssue=d.iid;else st.vIssue=d.iid;render()}
 else if(act==='startcase'){st.mode=d.ch;if(d.sid)st.scenarioId=d.sid;st.stage=0;render()}
 else if(act==='scen'){st.scenarioId=d.sid;st.stage=0;render()}
 else if(act==='cmdfilter'){st.commandFilter=d.filter;render()}
 else if(act==='signal'){st.signalId=d.sid;render()}
 else if(act==='stage'){st.stage=+d.i;render()}
 else if(act==='stageprev'){st.stage=Math.max(0,st.stage-1);render()}
 else if(act==='stagenext'){const s=scenById[st.scenarioId]||FF.scenarios[0];const was=st.stage;st.stage=Math.min(s.stages.length-1,st.stage+1);if(st.stage!==was&&st.stage===s.stages.length-1)FFSound.chime();render()}
 else if(act==='heat'){st.heat=+d.i;FFSound.sizzle((HEATN[HEAT_LADDER[st.heat][0]]-1)/4);render()}
 else if(act==='heatup'){st.heat=Math.min(HEAT_LADDER.length-1,st.heat+1);FFSound.sizzle((HEATN[HEAT_LADDER[st.heat][0]]-1)/4);render()}
 else if(act==='heatdown'){st.heat=Math.max(0,st.heat-1);FFSound.tick();render()}
 else if(act==='reset'){st.familyId=null;st.variantId=null;st.brand='featured';st.mode='explore';st.compareIds=[];st.pfSpice=null;st.pfType=null;render()}
 if(anchor&&anchor.startsWith('#')){const el=document.querySelector(anchor);if(el){setTimeout(()=>el.scrollIntoView({behavior:RM?'auto':'smooth',block:'start'}),0)}}
});

renderNav();renderFooter();renderSupport();render();
if(RM)document.getElementById('foottop').classList.add('in');
else new IntersectionObserver((es,o)=>es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');o.disconnect()}})).observe(document.getElementById('foottop'));
</script>
