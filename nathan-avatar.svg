<svg width="480" height="480" viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="avtitle avdesc">
  <title id="avtitle">Nathan Song monogram</title>
  <desc id="avdesc">A premium NS monogram in a warm red-to-gold gradient on a soft cream disc, framed by a warm-to-cool gradient ring.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#FFF7EE"/>
      <stop offset="60%" stop-color="#FBE7CF"/>
      <stop offset="100%" stop-color="#F3CFA6"/>
    </radialGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8331C"/>
      <stop offset="55%" stop-color="#FF6A2B"/>
      <stop offset="100%" stop-color="#F5B301"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD98A"/>
      <stop offset="52%" stop-color="#FF7A45"/>
      <stop offset="100%" stop-color="#7FA8FF"/>
    </linearGradient>
    <clipPath id="disc"><circle cx="240" cy="240" r="228"/></clipPath>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <g clip-path="url(#disc)">
    <rect x="0" y="0" width="480" height="480" fill="url(#bg)"/>
    <circle cx="240" cy="240" r="228" fill="#E77E3F" opacity="0.06"/>
    <!-- faint concentric guide for a crafted feel -->
    <circle cx="240" cy="240" r="176" fill="none" stroke="#C9852F" stroke-width="1.5" opacity="0.16"/>

    <!-- soft drop shadow under the monogram -->
    <g transform="translate(-4 6)" filter="url(#sh)" opacity="0.22">
      <path d="M150 322 L150 166 L238 322 L238 166" fill="none" stroke="#7A2A12" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M342 206 C342 184 320 174 300 174 C276 174 262 189 262 210 C262 231 283 238 302 244 C323 250 344 257 344 280 C344 302 320 312 298 312 C275 312 256 301 255 279"
            fill="none" stroke="#7A2A12" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- the monogram -->
    <g transform="translate(-4 0)">
      <path d="M150 322 L150 166 L238 322 L238 166" fill="none" stroke="url(#mono)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M342 206 C342 184 320 174 300 174 C276 174 262 189 262 210 C262 231 283 238 302 244 C323 250 344 257 344 280 C344 302 320 312 298 312 C275 312 256 301 255 279"
            fill="none" stroke="url(#mono)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- subtle inner highlight for polish -->
      <path d="M150 322 L150 166 L238 322 L238 166" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.14"/>
    </g>
  </g>

  <!-- premium gradient ring -->
  <circle cx="240" cy="240" r="228" fill="none" stroke="url(#ring)" stroke-width="8"/>
  <circle cx="240" cy="240" r="221" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
</svg>
