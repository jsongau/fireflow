<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FireFlow Product Intelligence — Preview</title>
<style>
:root{
--ink-900:#1c0c1b;--ink-800:#33172f;--ink-700:#4a2244;--paper-50:#fbf3ec;--paper-100:#f4e7da;--paper-200:#e9d6c4;
--chili-600:#ff4d3d;--chili-500:#ff6552;--chili-050:#ffe1db;--carbo-400:#ffc24b;--coral-700:#d93521;
--samyang-accent:#f0a91f;--tangle-accent:#22b57f;--mep-accent:#3fb8c9;
--ok-500:#1f9e6e;--warn-500:#e09214;--risk-600:#e0392a;--info-500:#3d84e0;
--src-official:#3d84e0;--src-retail:#a37c95;--src-editorial:#d98f16;--src-synthetic:#8a6df0;
--slate-600:#6f5766;--slate-400:#9a8391;--line:#1e112026;--ink:#1e1120;
--font-display:"Fraunces",Georgia,serif;--font-ui:"Inter",system-ui,-apple-system,sans-serif;
--r-sm:8px;--r-md:12px;--r-lg:18px;--sh1:0 1px 2px #0000000f,0 2px 8px #0000000a;--sh2:0 8px 30px #0000001f;--sh3:0 18px 50px #00000030;
--bw:2px;--boff:4px 4px 0 var(--ink);--bofflg:6px 6px 0 var(--ink);
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font-ui);color:var(--ink-800);background:var(--paper-50);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);line-height:1.12;margin:0 0 12px}
button{font-family:var(--font-ui);cursor:pointer}
a{color:var(--chili-600);text-decoration:none}
img{max-width:100%}
.wrap{max-width:1200px;margin:0 auto;padding:0 16px}
.eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:.833rem;color:var(--chili-600);margin:0 0 8px;font-weight:700}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:600;line-height:1;padding:.35em .6em;border-radius:999px;border:1px solid var(--line);background:#ffffffcc;color:var(--slate-600)}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
:focus-visible{outline:3px solid var(--info-500);outline-offset:2px;border-radius:4px}
.previewbanner{background:var(--warn-500);color:#3a2a00;text-align:center;font-size:.82rem;font-weight:600;padding:7px 16px}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .55s cubic-bezier(.2,.7,.2,1),transform .55s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
.mnav{position:sticky;top:0;z-index:40;background:var(--ink-900);color:var(--paper-50)}
.mnav .bar{display:flex;align-items:center;gap:8px;padding:10px 16px;max-width:1200px;margin:0 auto}
.brandmark{font-family:var(--font-display);font-weight:700;font-size:1.3rem;color:var(--paper-50);margin-right:8px;line-height:1}
.brandmark small{font-family:var(--font-ui);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--carbo-400);display:block;margin-top:1px}
.mgroups{display:flex;gap:2px;flex:1}
.mgroup{background:none;border:none;color:var(--paper-100);font-weight:600;font-size:.9rem;padding:.6em .8em;border-radius:8px}
.mgroup[aria-expanded="true"],.mgroup:hover{background:#ffffff16}
.soundbtn{background:#ffffff12;border:1px solid #ffffff26;color:var(--paper-100);border-radius:999px;font-weight:600;font-size:.8rem;padding:.4em .8em;display:inline-flex;gap:6px;align-items:center}
.soundbtn .wave{width:8px;height:8px;border-radius:50%;background:var(--slate-400)}
.soundbtn[aria-pressed="true"] .wave{background:var(--ok-500)}
.mpanel{position:absolute;left:0;right:0;background:var(--paper-50);color:var(--ink-800);border-bottom:1px solid var(--line);box-shadow:var(--sh2);display:none}
.mpanel.open{display:block}
.mpanel .inner{max-width:1200px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1.4fr 2.6fr;gap:24px}
.mfeature{background:var(--paper-100);border:1px solid var(--line);border-radius:var(--r-md);padding:16px;display:grid;gap:8px}
.mfeature img{width:100%;height:120px;object-fit:contain;border-radius:8px}
.mlinks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 20px;align-content:start}
.mlinks a{color:var(--ink-800);font-weight:600;font-size:.92rem;padding:6px 0}
.mlinks a:hover{color:var(--chili-600)}
.mplanned{font-size:.68rem;color:var(--slate-400);font-weight:700;text-transform:uppercase;margin-left:6px}
.hamb{display:none}
.rail{position:sticky;top:52px;z-index:30;background:var(--paper-50);border-bottom:1px solid var(--line);box-shadow:var(--sh1)}
.rail .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:10px 16px}
.rail .rname{font-weight:700;color:var(--ink-900)}
.rail .rfmt{color:var(--slate-600);font-weight:500}
.rmode{font-size:.78rem;font-weight:700;text-transform:capitalize;padding:.2em .6em;border-radius:999px;border:1px solid var(--line);color:var(--slate-600)}
.spacer{flex:1}
.rlink{font-size:.833rem;font-weight:600;color:var(--ink-800)}
.reset{font-size:.833rem;font-weight:600;background:none;border:1px solid var(--line);border-radius:999px;padding:.3em .8em;color:var(--slate-600)}
.trail{font-size:.833rem;color:var(--slate-600);padding:12px 16px;max-width:1200px;margin:0 auto}
.trail b{color:var(--slate-400);font-weight:400;margin:0 .4em}
.stage{position:relative;display:grid;place-items:center;width:100%}
.stage.hero{aspect-ratio:1/1;max-width:380px}
.stage.dossier{aspect-ratio:1/1;max-width:340px}
.stage .ground{position:absolute;inset:6%;border-radius:50%;background:radial-gradient(closest-side,#ffffff66,#ffffff00 72%);z-index:0}
.dark .stage .ground{background:radial-gradient(closest-side,#ffffff22,#ffffff00 70%)}
.pkg{position:relative;z-index:1;width:60%;aspect-ratio:3/4;border-radius:14px;background:linear-gradient(160deg,#fff,#f4ece0);border:1px solid #00000014;box-shadow:var(--sh2);display:flex;flex-direction:column;justify-content:flex-end;gap:4px;padding:14% 10% 10%;overflow:hidden}
.pkg::before{content:"";position:absolute;inset:0 0 auto 0;height:34%;background:var(--accent,#c2341d);opacity:.92}
.pkg .bs{position:relative;color:#fff;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:.72rem;margin-bottom:auto}
.pkg .pn{font-family:var(--font-display);font-weight:700;line-height:1.05;color:var(--ink-900);font-size:1rem}
.pkg .pf{font-size:.72rem;font-weight:600;color:var(--slate-600)}
.pimg{position:absolute;z-index:2;inset:2%;width:96%;height:96%;object-fit:contain;filter:drop-shadow(0 14px 24px #0000003a)}
.hero{position:relative;background:radial-gradient(120% 120% at var(--mx,80%) var(--my,0%),var(--ink-700),var(--ink-900) 55%);color:var(--paper-100);overflow:hidden}
.hero .wrap{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center;padding:64px 16px;position:relative;z-index:1}
.hero h1{color:var(--paper-50);font-size:clamp(2.2rem,5vw,3.4rem);max-width:15ch;letter-spacing:-.01em}
.lede{color:#e7d8c3cc;font-size:1.15rem;max-width:52ch}
.controls{display:flex;flex-wrap:wrap;gap:24px;margin:24px 0}
.cl{font-size:.78rem;color:#e7d8c399;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.seg{display:inline-flex;gap:4px;padding:4px;background:#ffffff1a;border:1px solid #ffffff22;border-radius:999px}
.seg button{font-weight:600;font-size:.833rem;border:none;background:transparent;color:var(--paper-100);border-radius:999px;padding:.5em 1em;min-height:38px}
.seg button[aria-pressed="true"]{background:var(--paper-50);color:var(--ink-900)}
.picks{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:8px}
.pick{font-weight:600;font-size:.833rem;color:var(--paper-100);background:#ffffff14;border:1px solid #ffffff26;border-radius:999px;padding:.55em .95em;min-height:40px}
.pick[aria-pressed="true"]{background:var(--paper-50);color:var(--ink-900);border-color:var(--paper-50)}
.focus{display:grid;gap:16px;justify-items:center}
.fname{font-family:var(--font-display);font-size:1.7rem;color:var(--paper-50);margin:0}
.fsub{color:#e7d8c3aa;font-size:.833rem;margin:0}
.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.btn{font-weight:600;border:1px solid transparent;border-radius:8px;display:inline-flex;align-items:center;gap:8px;font-size:.833rem;padding:.55em .9em;min-height:40px}
.btn.primary{background:var(--chili-600);color:var(--paper-50)}
.btn.primary:hover{background:var(--chili-500)}
.btn.secondary{background:transparent;color:var(--ink-800);border-color:var(--ink-700)}
.btn.ghost{background:transparent;color:var(--ink-800)}
.hero .btn.secondary,.hero .btn.ghost{color:var(--paper-100);border-color:#ffffff44}
.empty-hero{border:1px dashed #ffffff33;border-radius:14px;padding:32px;text-align:center;max-width:340px}
section.sec{scroll-margin-top:104px}
.sec.light{background:var(--paper-50)}
.sec.light2{background:var(--paper-100)}
.sec.dark{background:var(--ink-900);color:var(--paper-100)}
.sec.dark .h2{color:var(--paper-50)}.sec.dark .muted{color:#e7d8c3cc}
.sec .wrap{padding:64px 16px}
.h2{font-size:clamp(1.7rem,3.4vw,2.2rem);margin:0 0 8px}
.muted{color:var(--slate-600);max-width:64ch}
.chip{font-weight:600;font-size:.833rem;background:#fff;border:1px solid var(--line);border-radius:999px;padding:.45em .85em;min-height:36px;display:inline-flex;align-items:center;gap:8px;color:var(--ink-800)}
.chip[aria-pressed="true"]{background:var(--ink-900);color:var(--paper-50);border-color:var(--ink-900)}
.chipdot{width:9px;height:9px;border-radius:50%}
.row-filters{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.bento{list-style:none;padding:0;margin:16px 0 0;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.bento>li{min-width:0}
.bento>li.big{grid-column:span 2;grid-row:span 2}
.tilt{perspective:900px}
.pcard{position:relative;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;box-shadow:var(--sh1);overflow:hidden;height:100%;transform-style:preserve-3d;transition:transform .18s ease,box-shadow .18s ease}
.pcard:hover{box-shadow:var(--sh3)}
.pcard.on{outline:2px solid var(--chili-600)}
.pcard .glow{position:absolute;inset:0;border-radius:var(--r-md);padding:1px;background:radial-gradient(200px 200px at var(--gx,50%) var(--gy,0%),var(--card-accent,var(--chili-500)),transparent 60%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .2s;pointer-events:none}
.pcard:hover .glow,.pcard:focus-within .glow{opacity:.9}
.pcard .photo{position:relative;display:grid;place-items:center;background:linear-gradient(160deg,var(--paper-100),var(--paper-200));aspect-ratio:16/11;overflow:hidden}
.big .photo{aspect-ratio:16/13}
.pcard .photo img{width:82%;height:82%;object-fit:contain;filter:drop-shadow(0 12px 18px #00000030);transition:transform .25s ease}
.pcard:hover .photo img{transform:scale(1.05)}
.pcard .ph{font-family:var(--font-display);font-weight:700;color:var(--ink-900);padding:12px;text-align:center}
.pcard .body{padding:14px;display:grid;gap:4px;text-align:left;background:none;border:none;width:100%;cursor:pointer}
.pcbrand{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--slate-400);font-weight:700}
.pcname{font-family:var(--font-display);font-weight:700;font-size:1.1rem;color:var(--ink-900)}
.big .pcname{font-size:1.4rem}
.pcmeta{font-size:.8rem;color:var(--slate-600);display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:2px}
.atag{font-size:.66rem;font-weight:700;color:var(--chili-600);background:var(--chili-050);border-radius:999px;padding:.15em .5em}
.heatpips{display:inline-flex;gap:2px;align-items:center}
.heatpips i{width:6px;height:6px;border-radius:50%;background:var(--line);display:inline-block}
.heatpips i.on{background:var(--chili-600)}
.fmts{list-style:none;display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 14px;margin:0}
.fmt{font-size:.8rem;font-weight:600;background:var(--paper-100);border:1px solid var(--line);border-radius:999px;padding:.25em .6em}
.fmt.on{background:var(--ink-900);color:var(--paper-50)}
.tabs{display:inline-flex;gap:4px;padding:4px;background:#00000010;border-radius:999px;flex-wrap:wrap}
.tabs button{font-weight:600;font-size:.833rem;border:none;background:transparent;color:var(--ink-800);border-radius:999px;padding:.5em .9em;min-height:38px}
.tabs button[aria-selected="true"]{background:var(--ink-900);color:var(--paper-50)}
.vmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0}
.purpose{font-size:1.1rem;margin:0}
.caveat{font-size:.833rem;color:var(--chili-600);background:var(--chili-050);border-radius:8px;padding:8px 12px;max-width:70ch}
.rlist{list-style:none;padding:0;margin:16px 0 0;display:grid;gap:8px}
.rrow{display:grid;grid-template-columns:26px 44px minmax(120px,1.3fr) minmax(70px,2fr) 40px auto auto;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
.rk{font-weight:700;color:var(--slate-400);text-align:center}
.rthumb{width:44px;height:44px;object-fit:contain;background:var(--paper-100);border-radius:8px}
.rn{text-align:left;background:none;border:none;font-weight:700;color:var(--ink-900);font-size:1rem}
.bar{background:#00000010;border-radius:999px;height:10px;overflow:hidden}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--chili-500),var(--chili-600));width:0;transition:width .8s cubic-bezier(.2,.7,.2,1)}
.sc{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.miss{color:var(--warn-500);font-weight:700}
.add{font-size:.8rem;font-weight:600;background:none;border:1px solid var(--line);border-radius:999px;padding:.3em .7em;color:var(--ink-800)}
.heatwrap{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center;background:linear-gradient(160deg,color-mix(in oklab,var(--paper-100),var(--chili-050) calc(var(--t,0)*70%)),var(--paper-50));border-radius:var(--r-lg);padding:32px;border:1px solid var(--line);transition:background .4s}
.heatgauge{position:relative;display:grid;place-items:center}
.heatgauge svg{width:220px;height:220px;position:absolute}
.heatsteps{display:flex;gap:6px;margin:16px 0}
.heatstep{flex:1;height:10px;border-radius:999px;background:var(--line);border:none;min-height:24px}
.heatstep.on{background:linear-gradient(90deg,var(--warn-500),var(--chili-600))}
.heatcap{color:var(--ink-800)}
.heatctrl{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
.dgrid{display:grid;grid-template-columns:360px 1fr;gap:48px;align-items:start}
.dleft{display:grid;gap:16px;justify-items:center;position:sticky;top:112px}
.dframe{position:relative;border-radius:var(--r-lg);padding:2px;background:linear-gradient(140deg,var(--card-accent,var(--chili-500)),transparent 60%)}
.dframe .inner{background:var(--paper-50);border-radius:calc(var(--r-lg) - 2px);padding:12px}
.flabel{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-400);font-weight:700}
.name{font-family:var(--font-display);font-size:clamp(1.6rem,3vw,2.1rem);margin:4px 0 12px}
.story{font-size:1.1rem;max-width:60ch;color:var(--ink-800)}
.attrs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:16px 0}
.attrs dt{font-size:.78rem;color:var(--slate-400);font-weight:700;text-transform:uppercase}
.attrs dd{margin:0;font-weight:600;color:var(--ink-900)}
.factcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--sh1)}
.facthead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.fact{display:grid;gap:4px;padding:12px 0;border-top:1px solid var(--line)}
.fl{font-size:.78rem;color:var(--slate-400);font-weight:700;text-transform:uppercase;display:inline-flex;gap:8px;align-items:center}
.fv{color:var(--ink-900);display:inline-flex;flex-wrap:wrap;gap:8px;align-items:center}
.unknown{color:var(--slate-600);font-style:italic}
.reminder{font-size:.833rem;color:var(--slate-600);background:var(--paper-100);border-radius:8px;padding:8px 12px;margin:12px 0 0}
.qwrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.qb{background:var(--paper-100);border:1px solid var(--line);border-radius:14px;padding:16px}
.qb.mut{opacity:.5}
.qb ul{margin:0;padding-left:1.1em;color:var(--slate-600);font-size:.833rem;display:grid;gap:4px}
.relchips{display:flex;flex-wrap:wrap;gap:8px}
.relchip{font-size:.8rem;font-weight:600;background:#fff;border:1px solid var(--line);border-radius:999px;padding:.35em .7em;color:var(--ink-800);display:inline-flex;gap:6px;align-items:center}
.relchip img{width:20px;height:20px;object-fit:contain}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.path{border:1px solid var(--line);border-radius:22px;background:#fff;padding:24px;box-shadow:var(--sh1)}
.path.on{border-color:var(--chili-500);box-shadow:0 0 0 2px var(--chili-050),var(--sh1)}
.phead{display:flex;justify-content:space-between;align-items:center}
.youare{font-size:.78rem;font-weight:700;color:var(--chili-600);background:var(--chili-050);border-radius:999px;padding:.2em .7em}
.ctx{font-size:.833rem;color:var(--slate-600);background:var(--paper-100);border-radius:8px;padding:8px 12px;display:flex;gap:10px;align-items:center}
.ctx img{width:34px;height:34px;object-fit:contain}
.issues{display:grid;gap:8px;margin-top:12px}
.issue{display:flex;gap:8px;align-items:center;font-size:1rem;padding:.5em .7em;border:1px solid var(--line);border-radius:8px}
.issue.on{border-color:var(--chili-500);background:var(--chili-050);font-weight:600}
.detail{margin-top:16px;border-top:1px solid var(--line);padding-top:16px;display:grid;gap:12px}
.sev{font-size:.833rem;font-weight:700;padding:.25em .7em;border-radius:999px;border:1px solid}
.sev[data-s="standard"]{color:var(--info-500);border-color:var(--info-500)}
.sev[data-s="elevated"]{color:var(--warn-500);border-color:var(--warn-500)}
.sev[data-s="priority"]{color:var(--chili-600);border-color:var(--chili-600)}
.sev[data-s="specialist"]{color:#fff;background:var(--risk-600);border-color:var(--risk-600)}
.escal{font-size:.833rem;background:#eef4f8;border:1px solid var(--info-500);border-radius:8px;padding:12px}
.steps{display:flex;flex-wrap:wrap;gap:8px;list-style:none;padding:0;margin:0;counter-reset:step}
.steps li{font-size:.833rem;font-weight:600;background:var(--paper-100);border-radius:999px;padding:.3em .7em;counter-increment:step}
.steps li::before{content:counter(step) ". ";color:var(--chili-600);font-weight:800}
.pickrow{display:flex;flex-wrap:wrap;gap:8px}
.spick{font-size:.833rem;font-weight:600;color:var(--paper-100);background:#ffffff12;border:1px solid #ffffff26;border-radius:999px;padding:.5em .9em}
.spick[aria-pressed="true"]{background:var(--paper-50);color:var(--ink-900)}
.case{background:var(--paper-50);color:var(--ink-800);border-radius:22px;padding:32px;margin-top:20px}
.casehead{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ctitle{font-family:var(--font-display);font-size:1.6rem;margin:0;color:var(--ink-900)}
.timeline{list-style:none;display:flex;flex-wrap:wrap;padding:0;margin:16px 0 20px}
.timeline li{flex:1 1 auto;min-width:92px}
.tbtn{display:grid;justify-items:center;gap:8px;width:100%;background:none;border:none;padding:8px 4px;position:relative}
.tbtn::before,.tbtn::after{content:"";position:absolute;top:11px;height:2px;background:var(--line)}
.tbtn::before{left:0;right:50%}.tbtn::after{left:50%;right:0}
.timeline li:first-child .tbtn::before{display:none}.timeline li:last-child .tbtn::after{display:none}
.tdot{width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--slate-400);position:relative;z-index:1}
.tlabel{font-size:.78rem;font-weight:600;color:var(--slate-600);text-align:center}
.tdone .tdot{background:var(--ok-500);border-color:var(--ok-500)}.tdone .tbtn::before,.tdone .tbtn::after{background:var(--ok-500)}
.tcur .tdot{background:var(--chili-600);border-color:var(--chili-600);box-shadow:0 0 0 4px var(--chili-050)}
.tcur .tlabel{color:var(--ink-900);font-weight:800}
.stagebox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:20px}

const FFSound=(()=>{let ctx=null,master=null,enabled=(localStorage.getItem('ff.sound')==='on');
 function ensure(){if(!ctx){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;ctx=new AC();master=ctx.createGain();master.gain.value=0.14;master.connect(ctx.destination);}if(ctx.state==='suspended')ctx.resume();return ctx;}
 function tone(freq,dur,type){if(!enabled)return;if(!ensure())return;const g=ctx.createGain();g.gain.value=0;const o=ctx.createOscillator();o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(master);const t=ctx.currentTime;g.gain.linearRampToValueAtTime(0.5,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.02);}
 function sizzle(intensity){if(!enabled)return;if(!ensure())return;const dur=0.34,n=ctx.sampleRate*dur,buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=ctx.createBufferSource();s.buffer=buf;const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900+intensity*1900;bp.Q.value=0.8;const g=ctx.createGain();g.gain.value=0;s.connect(bp);bp.connect(g);g.connect(master);const t=ctx.currentTime;g.gain.linearRampToValueAtTime(0.18+intensity*0.16,t+0.03);g.gain.exponentialRampToValueAtTime(0.001,t+dur);s.start(t);s.stop(t+dur);}
 return {tick(){tone(430,0.07,'triangle')},chime(){tone(660,0.16);setTimeout(()=>tone(990,0.2),90)},sizzle,
  toggle(){enabled=!enabled;localStorage.setItem('ff.sound',enabled?'on':'off');if(enabled)ensure();return enabled},isOn(){return enabled}};
})();

 <p style="margin:16px 0"><b>Reported:</b> ${esc(s.reported)}</p>
 <ol class="timeline">${s.stages.map((x,i)=>`<li class="${i===stage?'tcur':i<stage?'tdone':''}"><button class="tbtn" data-act="stage" data-i="${i}"><span class="tdot"></span><span class="tlabel">${esc(x.title)}</span></button></li>`).join('')}</ol>
 <div class="stagebox"><h4 style="margin:0 0 8px;font-size:1.44rem">${esc(s.stages[stage].title)}</h4><p style="margin:0 0 12px">${esc(s.stages[stage].detail)}</p><div style="display:flex;gap:8px"><button class="btn secondary" data-act="stageprev" ${stage===0?'disabled':''}>Previous</button><button class="btn primary" data-act="stagenext" ${stage>=s.stages.length-1?'disabled':''}>${stage>=s.stages.length-1?'Complete':'Advance'}</button></div></div>
 <div class="catt">${att('Verified facts',s.verifiedFacts)}${att('Evidence needed & why',s.evidenceNeeded)}<div class="att"><h5>Ownership</h5><p><b>Owner:</b> ${esc(s.owner)}</p><p><b>Collaborators:</b> ${esc(s.collaborators.join(', ')||'—')}</p></div><div class="att"><h5>Customer commitment</h5><p>${esc(s.customerUpdateCommitment)}</p></div>${att('Resolution options',s.resolutionOptions)}${att('Approvals required',s.approvalsRequired)}<div class="att"><h5>Root cause</h5><p>${esc(s.rootCause)}</p></div><div class="att"><h5>Corrective action</h5><p>${esc(s.correctiveAction)}</p></div></div>
 <p style="margin-top:20px;font-size:.833rem;color:var(--slate-600);font-style:italic">All names, cases, owners, and outcomes here are fictional, created to demonstrate the workflow.</p>
 </div></div></section>
 <section class="sec light" id="methodology"><div class="wrap"><p class="eyebrow">Trust</p><h2 class="h2">Methodology &amp; sources</h2><p class="muted">Product facts are labeled by origin: official Samyang America product information, public retail signals (single-listing, date-stamped, never sales), FireFlow editorial models, and synthetic demonstration data. Allergens and preparation are bound to the exact format. Rankings are multi-axis and show their inputs, confidence, and last-reviewed date. Unknown vendor specifications are shown as unavailable or as information that would require an approved sell sheet.</p></div></section>`}

function renderFooter(){
 document.getElementById('footwrap').innerHTML=`<div><p class="flead">FireFlow Product Intelligence</p><p class="disc" style="max-width:36ch">An independent Customer Experience portfolio concept exploring Samyang America&rsquo;s public U.S. portfolio: 45 families, 76 formats.</p></div>
 <div class="fcols">
 <div class="fcol"><h4>How to read the facts</h4><div class="legend"><span>${srcBadge('official')}</span><span>${srcBadge('retail-signal')}</span><span>${srcBadge('editorial')}</span><span>${srcBadge('synthetic')}</span></div><p class="disc" style="margin-top:10px">Research snapshot: 2026-07-07. Accessibility: keyboard operable, reduced-motion aware, non-color status.</p></div>
 <div class="fcol"><h4>Explore</h4><a href="#portfolio" data-navlink>All products</a><a href="#rankings" data-navlink>Rankings</a><a href="#compare" data-navlink>Compare</a><a href="#heat" data-navlink>Flavor &amp; heat</a></div>
 <div class="fcol"><h4>Consumer</h4><a href="#resolve" data-navlink>Product help</a><a href="#product" data-navlink>Allergens</a><a href="#simulate" data-navlink>Case status</a></div>
 <div class="fcol"><h4>Vendor & CX</h4><a href="#vendor" data-navlink>Order support</a><a href="#simulate" data-navlink>Deductions</a><a href="#methodology" data-navlink>Methodology</a></div>
 </div>
 <p class="disc">${esc(FF.disclaimer)}</p>`}

function render(){
 document.getElementById('app').innerHTML=renderHero()+renderPortfolio()+renderRankings()+renderHeat()+renderCompare()+renderDossier()+renderPaths()+renderSim();
 renderRail();
 enhance();
}

function enhance(){
 requestAnimationFrame(()=>{document.querySelectorAll('.bar>span[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%'});
  document.querySelectorAll('[data-heatarc]').forEach(el=>{el.style.strokeDashoffset=el.dataset.heatarc});});
 if(RM){document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));animated=true;}
 else if(!animated){const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.12});document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));animated=true;}
 else document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));
 if(!RM){document.querySelectorAll('[data-tilt]').forEach(card=>{const wrap=card.parentElement;
  wrap.addEventListener('pointermove',e=>{const r=card.getBoundingClientRect(),px=(e.clientX-r.left)/r.width,py=(e.clientY-r.top)/r.height;card.style.transform=`rotateY(${(px-.5)*6}deg) rotateX(${(.5-py)*6}deg)`;card.style.setProperty('--gx',px*100+'%');card.style.setProperty('--gy',py*100+'%')});
  wrap.addEventListener('pointerleave',()=>{card.style.transform=''})});
  const hero=document.querySelector('[data-spotlight]');if(hero){hero.addEventListener('pointermove',e=>{const r=hero.getBoundingClientRect();hero.style.setProperty('--mx',(e.clientX-r.left)/r.width*100+'%');hero.style.setProperty('--my',(e.clientY-r.top)/r.height*100+'%')})}}
}

document.addEventListener('click',e=>{
 const a=e.target.closest('[data-act]');if(!a)return;
 const d=a.dataset,act=d.act,anchor=a.getAttribute&&a.getAttribute('href');
 if(act==='noop'){}
 else if(act==='pick'){selFamily(d.fid)}
 else if(act==='pickvar'){selFamily(d.fid);st.variantId=d.vid;render()}
 else if(act==='mode'){st.mode=d.mode;FFSound.tick();render()}
 else if(act==='hbrand'){st.brand=d.brand;render()}
 else if(act==='pfbrand'){st.pfBrand=d.brand;st.pfCat='all';render()}
 else if(act==='pfcat'){st.pfCat=d.cat;render()}
 else if(act==='pfview'){st.pfView=d.view;render()}
 else if(act==='rank'){st.rankingMode=d.rank;render()}
 else if(act==='add'){if(!st.compareIds.includes(d.fid)&&st.compareIds.length<4){st.compareIds.push(d.fid);FFSound.tick()}render()}
 else if(act==='rm'){st.compareIds=st.compareIds.filter(x=>x!==d.fid);render()}
 else if(act==='clearcmp'){st.compareIds=[];render()}
 else if(act==='preset'){st.compareIds=d.ids.split(',');render()}
 else if(act==='pickmode'){selFamily(d.fid);st.mode=d.mode;render()}
 else if(act==='setfmt'){st.variantId=d.vid;render()}
 else if(act==='issue'){if(d.channel==='consumer')st.cIssue=d.iid;else st.vIssue=d.iid;render()}
 else if(act==='startcase'){st.mode=d.ch;if(d.sid)st.scenarioId=d.sid;st.stage=0;render()}
 else if(act==='scen'){st.scenarioId=d.sid;st.stage=0;render()}
 else if(act==='stage'){st.stage=+d.i;render()}
 else if(act==='stageprev'){st.stage=Math.max(0,st.stage-1);render()}
 else if(act==='stagenext'){const s=scenById[st.scenarioId]||FF.scenarios[0];const was=st.stage;st.stage=Math.min(s.stages.length-1,st.stage+1);if(st.stage!==was&&st.stage===s.stages.length-1)FFSound.chime();render()}
 else if(act==='heat'){st.heat=+d.i;FFSound.sizzle((HEATN[HEAT_LADDER[st.heat][0]]-1)/4);render()}
 else if(act==='heatup'){st.heat=Math.min(HEAT_LADDER.length-1,st.heat+1);FFSound.sizzle((HEATN[HEAT_LADDER[st.heat][0]]-1)/4);render()}
 else if(act==='heatdown'){st.heat=Math.max(0,st.heat-1);FFSound.tick();render()}
 else if(act==='reset'){st.familyId=null;st.variantId=null;st.brand='featured';st.mode='explore';st.compareIds=[];render()}
 if(anchor&&anchor.startsWith('#')){const el=document.querySelector(anchor);if(el){setTimeout(()=>el.scrollIntoView({behavior:RM?'auto':'smooth',block:'start'}),0)}}
});

renderNav();renderFooter();render();
if(RM)document.getElementById('foottop').classList.add('in');
else new IntersectionObserver((es,o)=>es.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');o.disconnect()}})).observe(document.getElementById('foottop'));
</script>
</body>
</html>
